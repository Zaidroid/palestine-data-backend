name: Daily Data Enrichment Fetch

on:
  schedule:
    - cron: '0 0 * * *' # Run automatically at midnight UTC
  workflow_dispatch: # Allow manual triggering from the GitHub Actions tab

jobs:
  fetch-and-transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Fetchers
        run: npm run fetch:all

      - name: Run Unified Pipeline Transformer
        run: npm run transform

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No data changes detected. Skipping commit."
            exit 0
          else
            git commit -m "chore: automated daily data enrichment [skip ci]"
            git push
          fi
