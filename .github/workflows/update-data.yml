name: Update Data

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and process all data
        run: npm run update-data
        env:
          CI: true

      - name: Check data size
        run: du -sh public/data/ && find public/data -name "*.json" | wc -l

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-data-${{ github.run_id }}
          path: public/data/
          retention-days: 7

      - name: Trigger Netlify rebuild
        if: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        run: curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
