version: "3.9"

services:
  alerts:
    build: .
    container_name: wb-alerts
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./session:/session
    env_file: .env
    environment:
      - DB_PATH=/data/alerts.db
      - TELEGRAM_SESSION_DIR=/session
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
